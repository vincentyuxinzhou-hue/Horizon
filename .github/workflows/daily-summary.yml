name: Daily Horizon Summary

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00，每天早上送日报
    - cron: '0 0 * * *'
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Verify Gemini API Key
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          echo "Testing Gemini API key (first 10 chars: ${GOOGLE_API_KEY:0:10}...)"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GOOGLE_API_KEY}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{"contents":[{"parts":[{"text":"Say OK"}]}]}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response body (first 500 chars): ${BODY:0:500}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Gemini API key test FAILED with HTTP $HTTP_CODE. Please check your GOOGLE_API_KEY secret."
            exit 1
          else
            echo "✅ Gemini API key is valid and working."
          fi

      - name: Run Horizon
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run horizon --hours 24

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
